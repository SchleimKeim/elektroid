name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: fedora-latest

    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: |
          sudo dnf update
          sudo dnf install -y automake autoconf libtool alsa-lib-devel zlib-devel libzip-devel gtk3-devel libsndfile-devel libsamplerate-devel pulseaudio-libs-devel gettext-devel json-glib-devel rubberband-devel
    - name: autoreconf
      run: autoreconf --install
    - name: configure
      run: ./configure
    - name: make
      run: make
    - name: make check
      run: make check
    - name: make distcheck
      run: make distcheck
